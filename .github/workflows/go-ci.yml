name: Go CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test -race -coverprofile=coverage.out -covermode=atomic ./...

      - name: Upload coverage
        uses: codecov/codecov-action@v5
        if: always()
        with:
          files: coverage.out
          fail_ci_if_error: false

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true

      - name: Build
        run: go build -v ./...

  test-install-ubuntu:
    name: Test Install (Ubuntu)
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Run install script
        run: |
          chmod +x install.sh
          bash install.sh --dir /tmp/glpictl-test

      - name: Verify binary
        run: |
          /tmp/glpictl-test/glpictl-ai version

      - name: Test config command
        run: |
          /tmp/glpictl-test/glpictl-ai config --help

  test-install-windows:
    name: Test Install (Windows)
    runs-on: windows-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Run install script
        shell: pwsh
        run: |
          powershell -ExecutionPolicy Bypass -File install.ps1

      - name: Verify binary
        shell: pwsh
        run: |
          & "$env:USERPROFILE\.local\bin\glpictl-ai.exe" version

      - name: Test config command
        shell: pwsh
        run: |
          & "$env:USERPROFILE\.local\bin\glpictl-ai.exe" config --help
